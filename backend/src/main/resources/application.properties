# ── Server ──────────────────────────────────────────────────────────────────
server.port=8086

# ── MySQL ────────────────────────────────────────────────────────────────────
# Update these credentials to match your local MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/daily_studies?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── SQL init (run schema.sql manually) ───────────────────────────────────────
spring.sql.init.mode=never

# ── Jackson (serialize dates as ISO strings, not arrays) ─────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
